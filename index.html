<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinemax - Sinhala Sub Movies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .search-box {
            max-width: 600px;
            margin: 20px auto;
            display: flex;
            gap: 10px;
            padding: 0 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            background: #1a1a1a;
            color: #fff;
        }
        .search-box button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: #667eea;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-box button:hover {
            background: #764ba2;
        }
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .movie-card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(102, 126, 234, 0.4);
        }
        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .movie-info {
            padding: 15px;
        }
        .movie-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-year {
            color: #999;
            font-size: 14px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1a1a;
            max-width: 900px;
            width: 90%;
            border-radius: 15px;
            padding: 30px;
            position: relative;
            margin: 20px;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 30px;
            cursor: pointer;
            color: #fff;
            background: #667eea;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-body {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .modal-poster {
            flex: 0 0 300px;
        }
        .modal-poster img {
            width: 100%;
            border-radius: 10px;
        }
        .modal-details {
            flex: 1;
            min-width: 300px;
        }
        .modal-details h2 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #667eea;
        }
        .modal-details p {
            margin: 10px 0;
            line-height: 1.6;
        }
        .play-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .play-btn:hover {
            transform: scale(1.05);
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 20px;
            color: #667eea;
        }
        .error {
            text-align: center;
            padding: 50px;
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 Cinemax</h1>
        <p>Watch Movies with Sinhala Subtitles</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search movies... e.g. Inception, Avatar">
        <button onclick="handleSearch()">Search</button>
    </div>

    <div class="container">
        <h2 id="sectionTitle">Popular Movies</h2>
        <div id="moviesGrid" class="movies-grid">
            <div class="loading">Loading movies...</div>
        </div>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const popularMovies = ['Inception', 'Avatar', 'The Dark Knight', 'Interstellar', 'The Matrix', 'Gladiator', 'Titanic', 'Avengers Endgame'];
        let currentMovies = [];

        async function loadPopularMovies() {
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = '<div class="loading">Loading movies...</div>';
            
            const movies = [];
            for (const title of popularMovies) {
                const data = await fetchOmdbData(null, title);
                if (data) {
                    movies.push({
                        title: data.Title,
                        image: data.Poster,
                        year: data.Year,
                        imdbID: data.imdbID
                    });
                }
            }
            currentMovies = movies;
            displayMovies(movies);
        }

        function displayMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            if (movies.length === 0) {
                grid.innerHTML = '<div class="error">No movies found</div>';
                return;
            }
            grid.innerHTML = movies.map(movie => `
                <div class="movie-card" onclick="openMovie('${movie.imdbID}')">
                    <img src="${movie.image !== 'N/A' ? movie.image : 'https://via.placeholder.com/200x300?text=No+Image'}" alt="${movie.title}">
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-year">${movie.year}</div>
                    </div>
                </div>
            `).join('');
        }

        async function handleSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            document.getElementById('sectionTitle').textContent = `Search: "${query}"`;
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = '<div class="loading">Searching...</div>';
            
            const results = await searchMovies(query);
            displayMovies(results);
        }

        async function openMovie(imdbID) {
            const modal = document.getElementById('movieModal');
            const modalBody = document.getElementById('modalBody');
            modal.classList.add('active');
            modalBody.innerHTML = '<div class="loading">Loading movie details...</div>';
            
            const [omdbData, videoData] = await Promise.all([
                fetchOmdbData(imdbID),
                fetchVideoData(imdbID)
            ]);
            
            if (!omdbData) {
                modalBody.innerHTML = '<div class="error">Movie details not found</div>';
                return;
            }
            
            let playButton = '<p style="color:#ff4444;">Video not available on CineSubz</p>';
            if (videoData && videoData.videoUrl) {
                playButton = `<a href="${videoData.videoUrl}" target="_blank" class="play-btn">▶ Play Now</a>`;
                if (videoData.whatsappDownloadUrl) {
                    playButton += `<br><br><a href="${videoData.whatsappDownloadUrl}" target="_blank" style="color:#25D366;">📱 WhatsApp Download</a>`;
                }
            }
            
            modalBody.innerHTML = `
                <div class="modal-poster">
                    <img src="${omdbData.Poster !== 'N/A' ? omdbData.Poster : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${omdbData.Title}">
                </div>
                <div class="modal-details">
                    <h2>${omdbData.Title}</h2>
                    <p><strong>Year:</strong> ${omdbData.Year}</p>
                    <p><strong>Rating:</strong> ⭐ ${omdbData.imdbRating}/10</p>
                    <p><strong>Runtime:</strong> ${omdbData.Runtime}</p>
                    <p><strong>Genre:</strong> ${omdbData.Genre}</p>
                    <p><strong>Director:</strong> ${omdbData.Director}</p>
                    <p><strong>Plot:</strong> ${omdbData.Plot}</p>
                    ${playButton}
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('movieModal').classList.remove('active');
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        window.onclick = (e) => {
            const modal = document.getElementById('movieModal');
            if (e.target === modal) closeModal();
        }

        // Load movies on page load
        loadPopularMovies();
    </script>
</body>
  </html>
